<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="icon" type="image/png" href="img/transparent.png">
    <style>
      :root {
        --bg: #e9ecef;
        --panel: #ffffff;
        --muted: #4f4f54;
        --border: #c2c6cc;
        --accent: #121212;
        --btn-primary: #1f1f1f;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: var(--accent);
        background: var(--bg);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      nav {
        width: 100%;
        max-width: 520px;
        margin: 0 auto 28px;
        text-align: center;
      }

      .title {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.24px;
      }

      .main {
        width: 100%;
        max-width: 520px;
      }

      .pass {
        width: 100%;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 32px;
        box-shadow: 0 18px 46px rgba(18, 18, 18, 0.08);
      }

      .pass form {
        display: grid;
        gap: 18px;
      }

      .pass form label {
        font-size: 1rem;
        font-weight: 600;
      }

      .pass form input[type="password"] {
        width: 100%;
        padding: 14px 14px;
        border-radius: 12px;
        border: 1px solid #b8bbc0;
        background: #fbfbfb;
        color: var(--accent);
        font-size: 1rem;
      }

      .pass form input[type="submit"] {
        width: 100%;
        padding: 14px 14px;
        border-radius: 12px;
        border: 0;
        background: var(--btn-primary);
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        transition: background 0.2s ease;
      }

      .pass form input[type="submit"]:hover {
        background: #101010;
      }

      @media (max-width: 520px) {
        .pass {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <section class="content">
      <nav>
        <h1 class="title">ARGUS</h1>
      </nav>
      <div class="main">
        <div class="pass">
          <form action="/login" method="POST">
            <label for="pass">Enter password to access the dashboard: </label>
            <input type="password" name="password" id="pass" />
            <input type="submit" value="Submit" />
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
